<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Trading Bot | Start Winning 📈</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #090b10; 
            --neon-green: #00ff88; 
            --neon-blue: #00f3ff;
            --text-main: #e2e8f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; text-align: center;
        }

        /* Tech Grid Background */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 255, 136, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 255, 136, 0.05) 1px, transparent 1px);
            animation: gridMove 20s linear infinite;
        }
        .glow-blob {
            position: fixed; width: 300px; height: 300px; background: var(--neon-blue);
            border-radius: 50%; filter: blur(100px); opacity: 0.15; top: -50px; right: -50px; z-index: -2;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        .container { width: 100%; max-width: 400px; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }

        .header { margin-bottom: 40px; width: 100%; }
        h1 { font-size: 22px; font-weight: 700; margin: 0; line-height: 1.4; text-transform: uppercase; letter-spacing: 1px; }
        .highlight { 
            color: var(--neon-green); font-weight: 900; font-size: 26px; 
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.6); display: inline-block;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); } to { text-shadow: 0 0 25px rgba(0, 255, 136, 0.9); transform: scale(1.02); } }
        
        .subtext { font-size: 15px; margin-top: 15px; line-height: 1.5; color: #94a3b8; font-weight: 500; }
        .urgency { color: #ff3b30; font-weight: bold; margin-top: 8px; font-size: 14px; }

        .btn-main { 
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: #000; padding: 20px; border-radius: 12px; text-decoration: none; 
            font-weight: 800; font-size: 18px; display: flex; align-items: center; 
            justify-content: center; gap: 12px; box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
            border: 1px solid rgba(0,255,136,0.5); width: 100%; cursor: pointer; text-transform: uppercase;
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.95); }

        /* Overlay */
        #guideOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(9, 11, 16, 0.98); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center;
        }
        .arrow-top { position: absolute; top: 30px; right: 40px; font-size: 60px; color: var(--neon-green); animation: point 0.8s infinite alternate; }
        @keyframes point { from { transform: translate(0, 0); } to { transform: translate(10px, -10px); } }
        
        .overlay-text { font-size: 20px; line-height: 1.6; color: white; margin-top: 20px; font-weight: 500; }
        .overlay-step { color: #94a3b8; font-size: 16px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .fake-btn { 
            color: var(--neon-green); font-size: 22px; border: 2px dashed var(--neon-green); 
            padding: 15px 25px; border-radius: 8px; display: inline-block; 
            margin-top: 25px; font-weight: bold; background: rgba(0, 255, 136, 0.05);
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-blob"></div>

<div class="container">
    <div class="header">
        <h1>🤖 Claim Your <br><span class="highlight">FREE AI BOT</span><br> Today!</h1>
        <div class="subtext">Start winning binary options trades automatically on complete autopilot.</div>
        <div class="urgency">⚠️ TOMORROW ACCESS BECOMES PAID ⚠️</div>
    </div>

    <button class="btn-main" onclick="handleMainClick()">
        <i class="fas fa-robot"></i> GET AI BOT NOW
    </button>
</div>

<div id="guideOverlay">
    <div class="arrow-top"><i class="fas fa-arrow-up"></i></div>
    <div class="overlay-text">
        <div style="font-size: 50px; margin-bottom: 20px; color: #fff;">⋮</div>
        <div class="overlay-step">Step 1</div>
        <b>Tap the three dots in the top corner</b><br><br><br>
        <div class="overlay-step">Step 2</div>
        <b>Select the option:</b><br>
        <div class="fake-btn">
            <i class="fas fa-globe"></i> OPEN IN BROWSER
        </div>
    </div>
</div>

<script>
    // Ссылки на нового бота
    const tgUrl = "tg://resolve?domain=TradeAi777bot";
    const webTgUrl = "https://t.me/TradeAi777bot";

    // Детектор встроенных браузеров (TikTok, Instagram и т.д.)
    function isRestrictedBrowser() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        return (ua.indexOf('TikTok') > -1) || (ua.indexOf('musical_ly') > -1) || (ua.indexOf('App-WebView') > -1) || (ua.indexOf('Instagram') > -1);
    }

    // Автоматический редирект, если открыто в обычном браузере
    window.onload = function() {
        if (!isRestrictedBrowser()) {
            window.location.href = tgUrl;
            // Фолбэк на обычную ссылку, если tg:// не сработал
            setTimeout(() => { window.location.href = webTgUrl; }, 1500); 
        }
    }

    // Клик по главной кнопке
    function handleMainClick() {
        if (isRestrictedBrowser()) {
            // Если в TikTok - показываем инструкцию
            document.getElementById('guideOverlay').style.display = 'flex';
        } else {
            // Если в браузере - кидаем в ТГ
            window.location.href = tgUrl;
        }
    }
</script>

</body>
</html>
